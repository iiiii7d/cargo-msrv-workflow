on:
  workflow_call:
    inputs:
      upgrade-branch-title:
        type: string
        default: Run `cargo-msrv`
      upgrade-branch-name:
        type: string
        default: cargo-msrv
      working-directory:
        type: string
        default: "."
      commit-message:
        type: string
        default: run cargo-msrv

jobs:
  cargo-msrv-upgrade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          
      - uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        env:
          # renovate: datasource=github-tags depName=rust-lang/rust versioning=rust-release-channel
          RUST_VERSION: 1.94.1
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: taiki-e/install-action@e9e8e031bcd90cdbe8ac6bb1d376f8596e587fbf # v2.70.2
        env:
          # renovate: datasource=crate depName=cargo-msrv versioning=loose
          CARGO_MSRV_VERSION: 0.19.3
        with:
          tool: cargo-msrv@${{ env.CARGO_MSRV_VERSION }}

      - run: |
          cat Cargo.toml | sed -z 's/rust-version.*\n//mg' > Cargo2.toml
          mv Cargo2.toml Cargo.toml
          
      - run: cargo msrv find --write-msrv
      
      - uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          commit-message: ${{ inputs.commit-message }}
          title: ${{ inputs.upgrade-branch-title }}
          branch: ${{ inputs.upgrade-branch-name }}
