on:
  workflow_call:
    inputs:
      upgrade-branch-title:
        type: string
        default: Run `cargo-msrv`
      upgrade-branch-name:
        type: string
        default: cargo-msrv
      working-directory:
        type: string
        default: "."
      commit-message:
        type: string
        default: run cargo-msrv

jobs:
  run-cargo-msrv:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: true
          
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
        env:
          # renovate: datasource=rust-version depName=rust
          RUST_VERSION: 1.96.0
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: cargo-bins/cargo-binstall@30b5ca8b54e1dcffd9548bc87ede1531310fdc67 # v1.20.0
      - run: cargo binstall --force cargo-msrv@${{ env.CARGO_MSRV_VERSION }}
        env:
          # renovate: datasource=crate depName=cargo-msrv versioning=loose
          CARGO_MSRV_VERSION: 0.19.3
          
      - run: sed -iE 's/rust-version.*\n//mg' Cargo.toml
          
      - run: cargo msrv find --write-msrv --ignore-lockfile -- cargo check --release

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cargo-toml
          path: Cargo.toml

  create-pull-request:
    runs-on: ubuntu-slim
    permissions:
      contents: write
      pull-requests: write
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    needs: run-cargo-msrv

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: true

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cargo-toml
          path: Cargo.toml

      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: ${{ inputs.commit-message }}
          title: ${{ inputs.upgrade-branch-title }} (${{ github.ref_name }})
          branch: ${{ inputs.upgrade-branch-name }}/${{ github.ref_name }} 
          delete-branch: true
